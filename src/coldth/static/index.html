<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#11120f">
    <title>Coldth</title>
    <link rel="stylesheet" href="/assets/styles.css?v=7">
    <link id="theme-stylesheet" rel="stylesheet">
    <script src="/assets/app.js?v=7" defer></script>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">Raspberry Pi equalizer</p>
          <h1>Coldth</h1>
        </div>
        <div class="header-controls">
          <a class="quiet-button settings-link" href="/settings">Settings</a>
          <label class="theme-picker">
            <span>Faceplate</span>
            <select id="theme-list" aria-label="Choose faceplate theme"></select>
          </label>
          <div id="engine-status" class="status" aria-live="polite">
            <span></span> Connecting
          </div>
        </div>
      </header>

      <section class="meters-panel" aria-labelledby="meters-title">
        <div class="meter-display">
          <div class="meter-title">
            <p class="eyebrow">Output level</p>
            <h2 id="meters-title">Stereo</h2>
          </div>
          <div class="stereo-meters">
            <div class="meter-row" data-channel="0">
              <span class="channel-label">L</span>
              <div class="meter-track">
                <span class="meter-fill"></span>
                <i class="peak-marker"></i>
              </div>
              <output>−∞</output>
            </div>
            <div class="meter-row" data-channel="1">
              <span class="channel-label">R</span>
              <div class="meter-track">
                <span class="meter-fill"></span>
                <i class="peak-marker"></i>
              </div>
              <output>−∞</output>
            </div>
            <div class="balance-control">
              <span>L</span>
              <label>
                <span>Balance</span>
                <input id="balance" type="range" min="-100" max="100" step="1" value="0">
              </label>
              <span>R</span>
              <output id="balance-value">Center</output>
            </div>
          </div>
          <div id="analyzer-status" class="analyzer-status">
            10-band analyzer standby
          </div>
          <div id="now-playing" class="now-playing" hidden>
            <img id="track-artwork" alt="">
            <div>
              <span id="track-state">AirPlay</span>
              <strong id="track-title">Unknown track</strong>
              <small id="track-byline"></small>
            </div>
          </div>
        </div>
      </section>

      <section class="eq-panel" aria-labelledby="eq-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Ten-band graphic EQ</p>
            <h2 id="eq-title">Shape the sound</h2>
          </div>
          <button id="reset" class="quiet-button" type="button">Reset</button>
        </div>
        <div id="equalizer" class="equalizer" aria-busy="true"></div>
      </section>

      <section class="preset-panel" aria-labelledby="preset-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Your settings</p>
            <h2 id="preset-title">Presets</h2>
          </div>
          <button id="save-preset" class="primary-button" type="button">
            Save current
          </button>
        </div>
        <div class="preset-controls">
          <select id="preset-list" aria-label="Choose preset"></select>
          <button id="load-preset" type="button">Load</button>
          <button id="export-preset" type="button">Export</button>
          <button id="delete-preset" class="danger-button" type="button">
            Delete
          </button>
          <label class="import-button">
            Import
            <input id="import-preset" type="file" accept="application/json,.json">
          </label>
        </div>
      </section>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <dialog id="save-dialog">
      <form method="dialog">
        <p class="eyebrow">New preset</p>
        <h2>Save this shape</h2>
        <label>
          Preset name
          <input id="preset-name" maxlength="80" autocomplete="off" required>
        </label>
        <div class="dialog-actions">
          <button value="cancel" class="quiet-button">Cancel</button>
          <button id="confirm-save" value="default" class="primary-button">
            Save preset
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
